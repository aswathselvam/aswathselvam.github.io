#      url: "https://twitter.com/"
    - label: "Stack Overflow"
      icon: "fab fa-fw fa-stack-overflow"
      url: "https://stackoverflow.com/users/15302683/aswath"

remote_theme: "mmistakes/minimal-mistakes@4.24.0"